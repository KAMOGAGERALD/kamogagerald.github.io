<!DOCTYPE html>
<html>
    <head>
        <title>Contact - Kamoga Gerald</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <!-- HEADER -->
        <div class="header">
            <h1 id="main-title">Kamoga Gerald</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main">

            <!-- CONTACT INFO -->
            <div class="section">
                <h2>Get In Touch</h2>
                <p>Have a project in mind? Want to collaborate? Feel free to reach out!</p>
            </div>

            <!-- CONTACT DETAILS -->
            <div class="section">
                <h2>Contact Details</h2>
                <ul>
                    <li>📍 Location: Uganda</li>
                    <li>📧 Email: kamoga@email.com</li>
                    <li>🌐 Website: kamogagerald.com</li>
                </ul>
            </div>

            <!-- CONTACT FORM -->
            <div class="section">
                <h2>Send Me a Message</h2>
                <form class="contact-form">

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email">
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <select>
                            <option>General Enquiry</option>
                            <option>Web Design Project</option>
                            <option>Collaboration</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="6" placeholder="Write your message here..."></textarea>
                    </div>

                    <div class="form-group">
                        <input type="checkbox" id="agree">
                        <label for="agree">I agree to be contacted by Kamoga Gerald</label>
                    </div>

                    <button type="submit" id="submit-btn">Send Message</button>

                </form>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="footer">
            <p>© 2026 Kamoga Gerald. All rights reserved.</p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
